<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Portfolio Viewer</title>
  <meta name="description" content="Dynamic portfolio generated from Supabase data." />
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
  <script defer src="dynamic-portfolio.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>
  <div id="scrollProgress" aria-hidden="true"></div>

  <main class="page" id="portfolioRoot">
    <section class="zoom-section portfolio-state" id="portfolioStatus">
      <h1>Portfolio Viewer</h1>
      <p class="lead">Pass a username in the URL query to render a generated portfolio.</p>
      <p class="meta">Example: <code>/dynamic-portfolio.html?username=demo_user</code></p>
    </section>
  </main>

  <button id="toTop" aria-label="Back to top">↑</button>

  <footer>
    <center><p>Dynamic data-driven portfolio rendering.</p></center>
  </footer>
</body>
</html>
