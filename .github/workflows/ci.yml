name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Run lint (optional)
        run: |
          if [ -f package.json ] && npm run | grep lint; then
            npm run lint
          else
            echo "No lint script"
          fi

      - name: Run tests (optional)
        run: |
          if [ -f package.json ] && npm run | grep test; then
            npm test
          else
            echo "No tests"
          fi
