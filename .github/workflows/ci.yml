name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  validate-static-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Check required files exist
      - name: Check essential files
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html missing"
            exit 1
          fi
          echo "✅ index.html exists"

      # ✅ Basic HTML validation (optional but good)
      - name: Validate HTML structure
        run: |
          grep -q "<html" index.html || (echo "❌ Invalid HTML" && exit 1)
          echo "✅ HTML structure looks valid"

      # ✅ Check JS files exist
      - name: Check JS files
        run: |
          if [ -d "js" ]; then
            echo "✅ JS folder exists"
          else
            echo "⚠️ No JS folder found"
          fi

      # ✅ Check env config file
      - name: Check env config
        run: |
          if [ -f "api/env.js" ]; then
            echo "✅ env.js found"
          else
            echo "⚠️ env.js missing"
          fi

      # ✅ Success message
      - name: CI Passed
        run: echo "🚀 Static project validation successful"
